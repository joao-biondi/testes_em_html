<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Cultura SH - Mapa da Cultura</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;900&family=Playfair+Display:ital,wght@0,400;0,700;0,800;1,400&family=Space+Grotesk:wght@500&display=swap" rel="stylesheet">
  
  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel Standalone -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body {
      margin: 0;
      padding: 0;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden; /* Evita rolagem horizontal acidental */
    }
    
    .animate-fade-in { animation: fadeIn 0.5s ease-out; }
    @keyframes fadeIn { 
      from { opacity: 0; transform: translateY(10px); } 
      to { opacity: 1; transform: translateY(0); } 
    }
    
    .grain { position: relative; }
    .grain::before { 
      content: ""; 
      position: absolute; 
      inset: 0; 
      opacity: 0.05; 
      pointer-events: none; 
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E"); 
    }
    
    .font-archivo { font-family: 'Archivo', sans-serif; }
    .font-playfair { font-family: 'Playfair Display', serif; }
    .font-grotesk { font-family: 'Space Grotesk', sans-serif; }

    /* Esconde barra de rolagem mas mantém funcionalidade para as tabelas horizontais */
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;
    
    // SVG Icons
    const SvgIcon = ({ children, className, ...rest }) => (
      <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...rest}>{children}</svg>
    );
    const MapIcon = (p) => <SvgIcon {...p}><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/><line x1="9" y1="3" x2="9" y2="18"/><line x1="15" y1="6" x2="15" y2="21"/></SvgIcon>;
    const MessageCircle = (p) => <SvgIcon {...p}><path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"/></SvgIcon>;
    const LogOut = (p) => <SvgIcon {...p}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></SvgIcon>;
    const Search = (p) => <SvgIcon {...p}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></SvgIcon>;
    const MapPin = (p) => <SvgIcon {...p}><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></SvgIcon>;
    const Phone = (p) => <SvgIcon {...p}><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></SvgIcon>;
    const Mail = (p) => <SvgIcon {...p}><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></SvgIcon>;
    const User = (p) => <SvgIcon {...p}><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></SvgIcon>;
    const Building = (p) => <SvgIcon {...p}><rect width="16" height="20" x="4" y="2" rx="2" ry="2"/><path d="M9 22v-4h6v4"/><path d="M8 6h.01"/><path d="M16 6h.01"/><path d="M12 6h.01"/><path d="M12 10h.01"/><path d="M12 14h.01"/><path d="M16 10h.01"/><path d="M16 14h.01"/><path d="M8 10h.01"/><path d="M8 14h.01"/></SvgIcon>;
    const Music = (p) => <SvgIcon {...p}><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></SvgIcon>;
    const Menu = (p) => <SvgIcon {...p}><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></SvgIcon>;
    const X = (p) => <SvgIcon {...p}><line x1="18" x2="6" y1="6" y2="18"/><line x1="6" x2="18" y1="6" y2="18"/></SvgIcon>;
    const ArrowRight = (p) => <SvgIcon {...p}><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></SvgIcon>;
    const FileText = (p) => <SvgIcon {...p}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" x2="8" y1="13" y2="13"/><line x1="16" x2="8" y1="17" y2="17"/><line x1="10" x2="8" y1="9" y2="9"/></SvgIcon>;
    const Calendar = (p) => <SvgIcon {...p}><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></SvgIcon>;
    const ArrowLeft = (p) => <SvgIcon {...p}><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></SvgIcon>;
    const Landmark = (p) => <SvgIcon {...p}><line x1="3" x2="21" y1="22" y2="22"/><line x1="6" x2="6" y1="18" y2="11"/><line x1="10" x2="10" y1="18" y2="11"/><line x1="14" x2="14" y1="18" y2="11"/><line x1="18" x2="18" y1="18" y2="11"/><polygon points="12 2 20 7 4 7"/></SvgIcon>;
    const Award = (p) => <SvgIcon {...p}><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></SvgIcon>;
    const Globe = (p) => <SvgIcon {...p}><circle cx="12" cy="12" r="10"/><line x1="2" x2="22" y1="12" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></SvgIcon>;
    const Clock = (p) => <SvgIcon {...p}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></SvgIcon>;

    const Instagram = ({ className, ...rest }) => (
      <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
        fill="none" stroke="currentColor" strokeWidth={2} strokeLinecap="round" strokeLinejoin="round" {...rest}>
        <rect width="20" height="20" x="2" y="2" rx="5" ry="5" />
        <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z" />
        <line x1="17.5" x2="17.51" y1="6.5" y2="6.5" />
      </svg>
    );

    const C = {
      cream: '#f3ede1', paper: '#faf6ec', ink: '#1a1a1a',
      red: '#e5484d', amber: '#f5a623', teal: '#2f6f6a', violet: '#8a86f0',
    };

    const INDICADORES_DADOS = [
      { name: 'Música', artistas: 45, espaços: 12, projetos: 20 },
      { name: 'Teatro', artistas: 25, espaços: 5, projetos: 8 },
      { name: 'Artes Visuais', artistas: 30, espaços: 8, projetos: 15 },
      { name: 'Dança', artistas: 35, espaços: 10, projetos: 12 },
      { name: 'Literatura', artistas: 15, espaços: 4, projetos: 5 },
    ];
    
    const DISTRIBUICAO_DADOS = [
      { name: 'Artistas Independentes', value: 150 },
      { name: 'Produtores Culturais', value: 45 },
      { name: 'Espaços Públicos', value: 15 },
      { name: 'Espaços Privados', value: 24 },
    ];
    
    const DIRETORIO_DADOS = [
      { id: 1, name: 'João Silva', type: 'Artista', category: 'Música', description: 'Cantor e compositor local. Foco em música sertaneja e apresentações em eventos do município.', location: 'Centro', ativo: '2019', obras: 24, portfolio: ['Show “Raiz Viva”', 'EP autoral (2024)', 'Live sertaneja'], contato: '(45) 99000-0001', inst: '@joaosilva.musica' },
      { id: 2, name: 'Espaço Cultural das Águas', type: 'Espaço', category: 'Multiuso', description: 'Local destinado a exposições e apresentações teatrais. Capacidade técnica para 200 pessoas.', location: 'Vila Rica', ativo: '2015', obras: 40, portfolio: ['Sala de espetáculos', 'Galeria de exposições', 'Palco externo'], contato: '(45) 3268-0000', inst: '@espacodaguas' },
      { id: 3, name: 'Maria Fernandes', type: 'Produtor', category: 'Eventos', description: 'Produção executiva de eventos culturais e festivais de dança na região.', location: 'São Luiz', ativo: '2017', obras: 18, portfolio: ['Festival de Dança SH', 'Mostra Cultural 2025', 'Arraiá do Produtor'], contato: '(45) 99000-0003', inst: '@mariaproducoes' },
      { id: 4, name: 'Cia de Teatro Máscaras', type: 'Artista', category: 'Teatro', description: 'Grupo teatral com 10 anos de registro e atuação continuada em Santa Helena.', location: 'Centro', ativo: '2014', obras: 32, portfolio: ['Peça “Máscaras”', 'Teatro nas escolas', 'Cortejo de rua'], contato: '(45) 99000-0004', inst: '@ciamascaras' },
      { id: 5, name: 'Galeria Pôr do Sol', type: 'Espaço', category: 'Artes Visuais', description: 'Galeria independente voltada à exposição de artes plásticas locais.', location: 'Balneário', ativo: '2018', obras: 60, portfolio: ['Exposição coletiva', 'Residência artística', 'Salão de artes'], contato: '(45) 99000-0005', inst: '@galeriapordosol' },
      { id: 6, name: 'Banda Raízes', type: 'Artista', category: 'Música', description: 'Banda de rock e pop rock com repertório autoral e cover.', location: 'Sub-Sede', ativo: '2020', obras: 15, portfolio: ['Turnê regional', 'Single “Raízes”', 'Show acústico'], contato: '(45) 99000-0006', inst: '@bandaraizes' },
    ];

    const POLITICAS_DADOS = [
      { id: 1, tipo: 'Edital', titulo: 'Fomento à Cultura 2026', status: 'Aberto', prazo: '31 Ago 2026', valor: 'R$ 250 mil', desc: 'Chamamento público para apoio a projetos de artistas e coletivos culturais do município.', color: C.teal },
      { id: 2, tipo: 'Programa', titulo: 'Prosa e Viola', status: 'Em andamento', prazo: 'Contínuo', valor: '—', desc: 'Encontros de música de raiz e viola caipira, com formação e apresentações abertas à comunidade.', color: C.amber },
      { id: 3, tipo: 'Fomento', titulo: 'Cultura nas Escolas', status: 'Em andamento', prazo: 'Ano letivo', valor: 'R$ 80 mil', desc: 'Leva oficinas de teatro, música e artes visuais para a rede municipal de ensino.', color: C.violet },
      { id: 4, tipo: 'Edital', titulo: 'Ocupação dos Espaços', status: 'Encerrado', prazo: '10 Mai 2026', valor: 'R$ 40 mil', desc: 'Seleção de propostas para ativação dos espaços culturais públicos ao longo do ano.', color: C.red },
    ];
    
    const NOTICIAS_DADOS = [
      { id: 1, title: 'Arraiá na Feira do Produtor', date: '08 Jul', year: '2026', type: 'Evento', excerpt: 'Programação cultural com shows ao vivo de Lilian, Moro e Lindomar, além de comidas típicas a partir das 17h.' },
      { id: 2, title: 'Inscrições Abertas: Projeto Prosa e Viola', date: '03 Jul', year: '2026', type: 'Edital', excerpt: 'Inscrições abertas até 03/07 para o projeto Prosa e Viola. Vagas limitadas para participar dos encontros.' },
      { id: 3, title: 'Oficina: Enquadros e Esquecimentos', date: '01 Jul', year: '2026', type: 'Oficina', excerpt: 'A história e o turismo nos caminhos de Peabiru como força de pertencimento. Realização junto ao coral.' },
    ];

    const CAT_COLOR = { 'Música': C.teal, 'Teatro': C.amber, 'Artes Visuais': C.red, 'Dança': C.violet, 'Multiuso': C.ink, 'Eventos': C.red };

    const LogoMark = ({ size = 28 }) => (
      <div style={{ width: size, height: size, position: 'relative', flexShrink: 0 }}>
        <div style={{ position: 'absolute', left: 0, top: size * 0.12, width: size * 0.62, height: size * 0.62, borderRadius: '50%', background: C.red }}></div>
        <div style={{ position: 'absolute', right: 0, top: 0, width: size * 0.5, height: size * 0.5, borderRadius: '50%', background: C.amber, mixBlendMode: 'multiply' }}></div>
        <div style={{ position: 'absolute', right: size * 0.05, bottom: 0, width: size * 0.44, height: size * 0.44, borderRadius: '50%', background: C.teal, mixBlendMode: 'multiply' }}></div>
      </div>
    );

    const Kicker = ({ children, color = C.red }) => (
      <div className="font-archivo" style={{ fontWeight: 700, fontSize: 12, letterSpacing: 2, color, textTransform: 'uppercase' }}>{children}</div>
    );

    const Button = ({ children, variant = 'primary', className = '', ...props }) => {
      const styles = {
        primary: { background: C.ink, color: C.paper, border: `2px solid ${C.ink}` },
        outline: { background: 'transparent', color: C.ink, border: `2px solid ${C.ink}` },
        amber: { background: C.amber, color: C.ink, border: `2px solid ${C.ink}` },
      };
      return (
        <button {...props} className={`font-archivo w-full sm:w-auto transition-transform duration-200 hover:-translate-y-0.5 ${className}`}
          style={{ ...styles[variant], fontWeight: 700, fontSize: 12, letterSpacing: 1, textTransform: 'uppercase',
            padding: '13px 22px', borderRadius: 8, display: 'inline-flex', alignItems: 'center', justifyContent: 'center', gap: 8, cursor: 'pointer' }}>
          {children}
        </button>
      );
    };

    const SectionTitle = ({ kicker, title, subtitle, kickerColor }) => (
      <div className="mb-8 md:mb-12">
        {kicker && <div className="mb-3"><Kicker color={kickerColor}>{kicker}</Kicker></div>}
        <h2 className="font-playfair" style={{ fontWeight: 800, letterSpacing: '-1.5px', color: C.ink, fontSize: 'clamp(32px, 8vw, 58px)', lineHeight: 0.95 }}>{title}</h2>
        {subtitle && <p className="mt-4 md:mt-5 text-base md:text-lg" style={{ color: '#4a453c', maxWidth: 640, lineHeight: 1.5 }}>{subtitle}</p>}
      </div>
    );

    const SERIES = [
      { key: 'artistas', label: 'Artistas', color: C.red },
      { key: 'espaços', label: 'Espaços', color: C.amber },
      { key: 'projetos', label: 'Projetos', color: C.teal },
    ];

    const BarsChart = ({ dark = true, chips = true }) => {
      const maxVal = Math.max(...INDICADORES_DADOS.flatMap(d => SERIES.map(s => d[s.key])));
      const labelColor = dark ? '#c9c4b8' : '#6b665c';
      const legendColor = dark ? '#f4f1ea' : C.ink;
      const chipBg = dark ? 'rgba(255,255,255,.08)' : 'rgba(0,0,0,.05)';
      return (
        <div className="w-full">
          <div className="flex items-end justify-around gap-2 md:gap-4" style={{ height: 200 }}>
            {INDICADORES_DADOS.map(d => (
              <div key={d.name} className="flex items-end gap-1 md:gap-1.5 h-full" style={{ flex: 1 }}>
                {SERIES.map(s => (
                  <div key={s.key} className="flex-1 transition-all duration-500" title={`${s.label}: ${d[s.key]}`}
                    style={{ height: `${(d[s.key] / maxVal) * 100}%`, background: s.color, borderRadius: '5px 5px 0 0' }}></div>
                ))}
              </div>
            ))}
          </div>
          <div className="flex justify-around mt-3">
            {INDICADORES_DADOS.map(d => (
              <span key={d.name} className="font-grotesk text-center truncate px-1" style={{ flex: 1, fontSize: 9, color: labelColor, letterSpacing: .3 }}>{d.name}</span>
            ))}
          </div>
          <div className="flex flex-wrap gap-3 md:gap-5 justify-center mt-6">
            {SERIES.map(s => (
              <div key={s.key} className="flex items-center gap-2 font-archivo" style={{ fontSize: 10.5, fontWeight: 700, letterSpacing: 1, color: legendColor, textTransform: 'uppercase', background: chips ? chipBg : 'transparent', padding: chips ? '5px 10px' : 0, borderRadius: chips ? 6 : 0 }}>
                <span style={{ width: 12, height: 12, background: s.color, borderRadius: 3, border: dark ? 'none' : `1px solid ${C.ink}` }}></span>{s.label}
              </div>
            ))}
          </div>
        </div>
      );
    };

    const DonutChart = ({ dark = true, chips = true }) => {
      const colors = [C.red, C.amber, C.teal, C.violet];
      const total = DISTRIBUICAO_DADOS.reduce((a, d) => a + d.value, 0);
      const legendColor = dark ? '#f4f1ea' : '#3a3a3a';
      const chipBg = dark ? 'rgba(255,255,255,.08)' : 'rgba(0,0,0,.05)';
      let acc = 0;
      const stops = DISTRIBUICAO_DADOS.map((d, i) => {
        const start = (acc / total) * 360; acc += d.value; const end = (acc / total) * 360;
        return `${colors[i]} ${start}deg ${end}deg`;
      }).join(', ');
      return (
        <div className="flex flex-col items-center">
          <div className="relative my-2 w-48 h-48 sm:w-56 sm:h-56">
            <div className="w-full h-full rounded-full" style={{ background: `conic-gradient(${stops})` }}></div>
            <div className="absolute inset-0 m-auto rounded-full flex flex-col items-center justify-center w-28 h-28 sm:w-32 sm:h-32" style={{ background: C.cream }}>
              <span className="font-playfair" style={{ fontSize: 'clamp(32px, 8vw, 40px)', fontWeight: 800, color: C.ink, lineHeight: 1 }}>{total}</span>
              <span className="font-archivo mt-1" style={{ fontSize: 9, fontWeight: 700, letterSpacing: 2, color: '#6b665c' }}>TOTAL</span>
            </div>
          </div>
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-x-6 gap-y-2 mt-6 w-full px-4">
            {DISTRIBUICAO_DADOS.map((d, i) => (
              <div key={d.name} className="flex items-center gap-2 font-archivo truncate" style={{ fontSize: 11.5, fontWeight: 600, color: legendColor, background: chips ? chipBg : 'transparent', padding: chips ? '5px 9px' : 0, borderRadius: chips ? 6 : 0 }}>
                <span className="shrink-0" style={{ width: 12, height: 12, background: colors[i], borderRadius: 3, border: dark ? 'none' : `1px solid ${C.ink}` }}></span>
                <span className="truncate">{d.name}</span>
              </div>
            ))}
          </div>
        </div>
      );
    };

    const HomeView = ({ navigateTo, legendChips = true, chartsTheme = 'escuro' }) => (
      <div className="space-y-16 md:space-y-24 animate-fade-in pb-8">
        <section className="relative grain" style={{ background: C.cream, borderRadius: 20, border: `2px solid ${C.ink}`, overflow: 'hidden' }}>
          <div className="relative z-[2] grid grid-cols-1 lg:grid-cols-12 gap-8 md:gap-10 items-center p-6 sm:p-8 md:p-14">
            <div className="lg:col-span-7 space-y-6 md:space-y-7 text-center lg:text-left">
              <div className="inline-flex items-center justify-center gap-2 font-archivo mx-auto lg:mx-0" style={{ background: C.amber, color: C.ink, fontWeight: 700, fontSize: 11, letterSpacing: 1.5, padding: '6px 12px', borderRadius: 6, border: `2px solid ${C.ink}` }}>
                <MapPin className="w-3.5 h-3.5" /> SANTA HELENA · PR
              </div>
              <h1 className="font-playfair" style={{ fontWeight: 800, letterSpacing: '-1.5px', color: C.ink, fontSize: 'clamp(44px, 8vw, 84px)', lineHeight: 0.9 }}>
                Mapa da<br/>
                <span style={{ fontStyle: 'italic', color: C.teal }}>cultura</span>{' '}
                <span style={{ background: C.amber, padding: '0 12px', borderRadius: 8, display: 'inline-block', transform: 'rotate(-2deg)', border: `2px solid ${C.ink}` }}>viva</span>
              </h1>
              <p className="text-lg md:text-xl mx-auto lg:mx-0" style={{ color: '#3a3a3a', maxWidth: 460, lineHeight: 1.5 }}>
                234 agentes, 42 espaços e todo o fomento cultural do município — reunidos num só lugar.
              </p>
              <div className="flex flex-col sm:flex-row flex-wrap gap-3 pt-2 justify-center lg:justify-start">
                <Button onClick={() => navigateTo('mapa')}>Explorar diretório <ArrowRight className="w-4 h-4" /></Button>
                <Button onClick={() => navigateTo('login')} variant="outline">Sou agente</Button>
              </div>
            </div>
            <div className="lg:col-span-5 grid grid-cols-2 gap-3 md:gap-4 mt-6 lg:mt-0">
              <div className="col-span-2 flex flex-col justify-center text-center lg:text-left" style={{ background: C.ink, color: C.paper, borderRadius: 14, padding: '24px 22px', position: 'relative', overflow: 'hidden' }}>
                <div className="font-playfair" style={{ fontSize: 'clamp(48px, 10vw, 64px)', fontWeight: 800, lineHeight: 1 }}>234</div>
                <div className="font-archivo mt-1" style={{ fontSize: 11, fontWeight: 700, letterSpacing: 2, color: C.amber }}>AGENTES CADASTRADOS</div>
              </div>

          <label className="font-archivo block mb-2" style={{ fontSize: 10, fontWeight: 700, letterSpacing: 1, textTransform: 'uppercase', color: '#6b665c' }}>{label}</label>

                <ul className="space-y-3 text-sm" style={{ padding: 0, listStyle: 'none' }}>
