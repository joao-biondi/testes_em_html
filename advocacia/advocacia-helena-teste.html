<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filipiak & Dotto - Sistema de Gestão</title>
    
    <!-- Carrega o Tailwind CSS para os estilos -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Configura as bibliotecas do React e Ícones para rodarem direto no navegador -->
    <script type="importmap">
        {
            "imports": {
                "react": "https://esm.sh/react@18.2.0",
                "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
                "lucide-react": "https://esm.sh/lucide-react@0.344.0"
            }
        }
    </script>

    <!-- Carrega o Babel para traduzir o código React (JSX) no navegador -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Pequenos ajustes para a barra de rolagem ficar mais elegante */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #FAFAFA; }
        ::-webkit-scrollbar-thumb { background: #EAEAEA; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #C5A059; }
        body { margin: 0; padding: 0; }
    </style>
</head>
<body>
    <!-- Onde o sistema vai aparecer -->
    <div id="root"></div>

    <!-- O seu código React -->
    <script type="text/babel" data-type="module">
        import React, { useState, useMemo, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { 
            Scale, Wallet, FileText, Search, Plus, X, ChevronRight, DollarSign, Calendar,
            CheckCircle2, Clock, ArrowLeft, PieChart, Lock, Unlock, File, ShieldAlert,
            UploadCloud, User, Key, Trash2, Eye, LogOut
        } from 'lucide-react';

        // Dados iniciais de demonstração
        const initialContracts = [
          {
            id: 1,
            clientName: "Maria das Graças Silva",
            description: "Ação Previdenciária - Aposentadoria",
            totalAmount: 5000,
            date: "2023-10-15",
            status: "Ativo",
            payments: [
              { id: 101, amount: 1000, date: "2023-10-15" },
              { id: 102, amount: 500, date: "2023-11-15" }
            ],
            documents: [
              { id: 201, name: "Procuração_Assinada.pdf", isConfidential: false, file: null },
              { id: 202, name: "Contrato_Honorarios.pdf", isConfidential: true, file: null }
            ]
          },
          {
            id: 2,
            clientName: "Roberto Carlos Nunes",
            description: "Divórcio Litigioso",
            totalAmount: 8000,
            date: "2024-01-10",
            status: "Ativo",
            payments: [
              { id: 103, amount: 2000, date: "2024-01-10" }
            ],
            documents: []
          },
          {
            id: 3,
            clientName: "Empresa XPTO Ltda",
            description: "Assessoria Jurídica Mensal",
            totalAmount: 12000,
            date: "2024-02-01",
            status: "Ativo",
            payments: [
              { id: 104, amount: 12000, date: "2024-02-05" }
            ],
            documents: []
          }
        ];

        // Senhas mestre de demonstração
        const MASTER_PASSWORDS = ['1234', 'admin'];

        const formatCurrency = (value) => {
          return new Intl.NumberFormat('pt-BR', {
            style: 'currency',
            currency: 'BRL'
          }).format(value);
        };

        const Modal = ({ isOpen, onClose, title, children }) => {
          if (!isOpen) return null;
          return (
            <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 p-4 animate-in fade-in duration-200">
              <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden flex flex-col">
                <div className="flex justify-between items-center p-5 border-b border-[#EAEAEA] bg-[#FAFAFA]">
                  <h3 className="text-xl font-serif text-[#333]">{title}</h3>
                  <button onClick={onClose} className="text-gray-400 hover:text-red-500 transition-colors p-1 rounded-full hover:bg-red-50">
                    <X size={24} />
                  </button>
                </div>
                <div className="p-6 overflow-y-auto max-h-[80vh]">
                  {children}
                </div>
              </div>
            </div>
          );
        };

        const Button = ({ children, variant = 'primary', className = '', ...props }) => {
          const baseStyle = "flex items-center justify-center gap-2 px-4 py-2.5 rounded-lg font-medium transition-all duration-200 shadow-sm";
          const variants = {
            primary: "bg-[#C5A059] hover:bg-[#b08d4f] text-white",
            secondary: "bg-white border border-[#C5A059] text-[#C5A059] hover:bg-[#C5A059]/5",
            ghost: "bg-transparent text-gray-600 hover:bg-gray-100 shadow-none border border-transparent",
          };
          return (
            <button className={`${baseStyle} ${variants[variant]} ${className}`} {...props}>
              {children}
            </button>
          );
        };

        function App() {
          const [isLoggedIn, setIsLoggedIn] = useState(false);
          const [loginForm, setLoginForm] = useState({ user: '', password: '' });
          const [view, setView] = useState('dashboard');
          const [contracts, setContracts] = useState(initialContracts);
          const [selectedContractId, setSelectedContractId] = useState(null);
          const [searchTerm, setSearchTerm] = useState('');
          const [unlockedDocs, setUnlockedDocs] = useState({});
          const [isPasswordModalOpen, setIsPasswordModalOpen] = useState(false);
          const [docPasswordAttempt, setDocPasswordAttempt] = useState('');
          const [selectedDocId, setSelectedDocId] = useState(null);
          const [passwordError, setPasswordError] = useState(false);
          const [viewingDoc, setViewingDoc] = useState(null);
          const [docToDelete, setDocToDelete] = useState(null);
          const [isDeleteModalOpen, setIsDeleteModalOpen] = useState(false);
          const [deletePasswordAttempt, setDeletePasswordAttempt] = useState('');
          const [deletePasswordError, setDeletePasswordError] = useState(false);
          const [isNewContractModalOpen, setIsNewContractModalOpen] = useState(false);
          const [isNewPaymentModalOpen, setIsNewPaymentModalOpen] = useState(false);
          const [isNewDocModalOpen, setIsNewDocModalOpen] = useState(false);
          const [newContractForm, setNewContractForm] = useState({ clientName: '', description: '', totalAmount: '', date: '' });
          const [newPaymentForm, setNewPaymentForm] = useState({ amount: '', date: '' });
          const [newDocForm, setNewDocForm] = useState({ name: '', isConfidential: false, file: null });

          const handleLogin = (e) => {
            e.preventDefault();
            setIsLoggedIn(true);
          };

          const selectedContract = contracts.find(c => c.id === selectedContractId);

          const filteredContracts = contracts.filter(c =>
            c.clientName.toLowerCase().includes(searchTerm.toLowerCase())
          );

          const pdfUrl = useMemo(
            () => (viewingDoc && viewingDoc.file ? URL.createObjectURL(viewingDoc.file) : null),
            [viewingDoc]
          );

          useEffect(() => {
            return () => {
              if (pdfUrl) URL.revokeObjectURL(pdfUrl);
            };
          }, [pdfUrl]);

          const dashboardStats = useMemo(() => {
            let totalValue = 0;
            let totalReceived = 0;
            contracts.forEach(contract => {
              totalValue += contract.totalAmount;
              const paid = contract.payments.reduce((sum, p) => sum + p.amount, 0);
              totalReceived += paid;
            });
            return {
              totalValue,
              totalReceived,
              pending: totalValue - totalReceived,
              activeContracts: contracts.length
            };
          }, [contracts]);

          const handleAddContract = (e) => {
            e.preventDefault();
            const newContract = {
              id: Date.now(),
              ...newContractForm,
              totalAmount: parseFloat(newContractForm.totalAmount),
              status: "Ativo",
              payments: [],
              documents: []
            };
            setContracts([...contracts, newContract]);
            setIsNewContractModalOpen(false);
            setNewContractForm({ clientName: '', description: '', totalAmount: '', date: '' });
          };

          const handleAddPayment = (e) => {
            e.preventDefault();
            const updatedContracts = contracts.map(c => {
              if (c.id === selectedContractId) {
                return {
                  ...c,
                  payments: [...c.payments, { 
                    id: Date.now(), 
                    amount: parseFloat(newPaymentForm.amount), 
                    date: newPaymentForm.date 
                  }]
                };
              }
              return c;
            });
            setContracts(updatedContracts);
            setIsNewPaymentModalOpen(false);
            setNewPaymentForm({ amount: '', date: '' });
          };

          const handleAddDocument = (e) => {
            e.preventDefault();
            if (!newDocForm.file) return;
            const newDoc = {
              id: Date.now(),
              name: newDocForm.name,
              isConfidential: newDocForm.isConfidential,
              file: newDocForm.file
            };
            const updatedContracts = contracts.map(c => {
              if (c.id === selectedContractId) {
                return {
                  ...c,
                  documents: [...(c.documents || []), newDoc]
                };
              }
              return c;
            });
            setContracts(updatedContracts);
            setIsNewDocModalOpen(false);
            setNewDocForm({ name: '', isConfidential: false, file: null });
          };

          const handleUnlockDoc = (e) => {
            e.preventDefault();
            if (MASTER_PASSWORDS.includes(docPasswordAttempt)) {
              setUnlockedDocs({ ...unlockedDocs, [selectedDocId]: true });
              setIsPasswordModalOpen(false);
              setDocPasswordAttempt('');
              setPasswordError(false);
            } else {
              setPasswordError(true);
            }
          };

          const handleDeleteDoc = (e) => {
            e.preventDefault();
            if (MASTER_PASSWORDS.includes(deletePasswordAttempt)) {
              const updatedContracts = contracts.map(c => {
                if (c.id === selectedContractId) {
                  return {
                    ...c,
                    documents: c.documents.filter(d => d.id !== docToDelete.id)
                  };
                }
                return c;
              });
              setContracts(updatedContracts);
              setIsDeleteModalOpen(false);
              setDocToDelete(null);
              setDeletePasswordAttempt('');
              setDeletePasswordError(false);
            } else {
              setDeletePasswordError(true);
            }
          };

          const openDocViewer = (doc) => {
            const isLocked = doc.isConfidential && !unlockedDocs[doc.id];
            if (isLocked) {
              setSelectedDocId(doc.id);
              setIsPasswordModalOpen(true);
            } else {
              setViewingDoc(doc);
            }
          };

          const getContractProgress = (contract) => {
            const paid = contract.payments.reduce((sum, p) => sum + p.amount, 0);
            const percentage = contract.totalAmount > 0 ? (paid / contract.totalAmount) * 100 : 0;
            return { paid, percentage: Math.min(percentage, 100) };
          };

          if (!isLoggedIn) {
            return (
              <div className="min-h-screen bg-[#F8F9FA] flex flex-col items-center justify-center p-4">
                <div className="w-full max-w-md bg-white rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.08)] p-8 md:p-12 relative overflow-hidden border border-[#EAEAEA]">
                  <div className="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-[#D4AF37] via-[#C5A059] to-[#D4AF37]"></div>
                  <div className="flex flex-col items-center mb-10">
                    <div className="w-20 h-20 bg-gradient-to-br from-[#FAFAFA] to-[#EAEAEA] rounded-full flex items-center justify-center shadow-inner border border-[#D4AF37]/20 mb-4">
                      <Scale size={36} className="text-[#C5A059]" />
                    </div>
                    <h1 className="text-3xl font-serif text-[#333] tracking-tight">Filipiak & Dotto</h1>
                    <p className="text-sm text-[#C5A059] tracking-[0.2em] font-medium uppercase mt-2">Advocacia</p>
                  </div>

                  <form onSubmit={handleLogin} className="space-y-6">
                    <div>
                      <label className="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Usuário</label>
                      <div className="relative">
                        <User size={18} className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" />
                        <input type="text" required className="w-full pl-10 pr-4 py-3 bg-[#FAFAFA] border border-[#EAEAEA] rounded-xl focus:outline-none focus:border-[#C5A059] focus:ring-1 focus:ring-[#C5A059] transition-all text-[#333]" placeholder="Seu usuário" value={loginForm.user} onChange={e => setLoginForm({ ...loginForm, user: e.target.value })} />
                      </div>
                    </div>
                    <div>
                      <label className="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Senha</label>
                      <div className="relative">
                        <Key size={18} className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" />
                        <input type="password" required className="w-full pl-10 pr-4 py-3 bg-[#FAFAFA] border border-[#EAEAEA] rounded-xl focus:outline-none focus:border-[#C5A059] focus:ring-1 focus:ring-[#C5A059] transition-all text-[#333]" placeholder="Sua senha" value={loginForm.password} onChange={e => setLoginForm({ ...loginForm, password: e.target.value })} />
                      </div>
                    </div>
                    <button type="submit" className="w-full bg-[#C5A059] hover:bg-[#b08d4f] text-white py-3.5 rounded-xl font-medium shadow-md shadow-[#C5A059]/20 transition-all active:scale-[0.98] flex items-center justify-center gap-2">
                      Entrar no Sistema
                      <ChevronRight size={18} />
                    </button>
                  </form>
                  <div className="mt-8 text-center">
                    <p className="text-xs text-gray-400">Sistema de Gestão Financeira Exclusivo</p>
                  </div>
                </div>
              </div>
            );
          }

          return (
            <div className="min-h-screen bg-[#F5F5F5] font-sans text-[#333]">
              <header className="bg-white shadow-sm border-b border-[#EAEAEA] sticky top-0 z-30">
                <div className="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
                  <div className="flex items-center gap-3 cursor-pointer group" onClick={() => setView('dashboard')}>
                    <div className="w-10 h-10 bg-[#FAFAFA] rounded-full flex items-center justify-center border border-[#EAEAEA] group-hover:border-[#C5A059] transition-colors">
                      <Scale size={20} className="text-[#C5A059]" />
                    </div>
                    <div>
                      <h1 className="text-lg font-serif font-semibold text-[#333]">Filipiak&Dotto</h1>
                      <p className="text-[10px] text-gray-500 uppercase tracking-widest">Advocacia</p>
                    </div>
                  </div>
                  
                  <div className="flex items-center gap-4">
                    <div className="hidden md:flex items-center gap-2 bg-[#FAFAFA] px-3 py-1.5 rounded-full border border-[#EAEAEA]">
                      <Search size={16} className="text-gray-400" />
                      <input type="text" placeholder="Buscar cliente..." className="bg-transparent border-none outline-none text-sm w-48 text-[#333]" value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} />
                    </div>
                    <button onClick={() => setIsLoggedIn(false)} className="text-gray-400 hover:text-red-500 transition-colors p-2 rounded-full hover:bg-red-50" title="Sair">
                      <LogOut size={20} />
                    </button>
                  </div>
                </div>
              </header>

              <main className="max-w-6xl mx-auto px-4 py-8">
                {view === 'dashboard' && (
                  <div className="animate-in fade-in slide-in-from-bottom-4 duration-500">
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
                      <div>
                        <h2 className="text-3xl font-serif text-[#333]">Visão Geral</h2>
                        <p className="text-gray-500 mt-1">Acompanhe os recebimentos do escritório.</p>
                      </div>
                      <Button onClick={() => setIsNewContractModalOpen(true)}>
                        <Plus size={18} /> Novo Contrato
                      </Button>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
                      <div className="bg-white p-6 rounded-2xl shadow-sm border border-[#EAEAEA] border-l-4 border-l-[#333]">
                        <div className="flex justify-between items-start">
                          <div>
                            <p className="text-sm text-gray-500 font-medium">Total a Receber (Global)</p>
                            <h3 className="text-2xl font-bold text-[#333] mt-1">{formatCurrency(dashboardStats.totalValue)}</h3>
                          </div>
                          <div className="p-3 bg-gray-50 rounded-xl">
                            <Wallet size={24} className="text-gray-600" />
                          </div>
                        </div>
                      </div>
                      
                      <div className="bg-white p-6 rounded-2xl shadow-sm border border-[#EAEAEA] border-l-4 border-l-[#C5A059]">
                        <div className="flex justify-between items-start">
                          <div>
                            <p className="text-sm text-gray-500 font-medium">Já Recebido</p>
                            <h3 className="text-2xl font-bold text-[#C5A059] mt-1">{formatCurrency(dashboardStats.totalReceived)}</h3>
                          </div>
                          <div className="p-3 bg-[#C5A059]/10 rounded-xl">
                            <CheckCircle2 size={24} className="text-[#C5A059]" />
                          </div>
                        </div>
                      </div>

                      <div className="bg-white p-6 rounded-2xl shadow-sm border border-[#EAEAEA] border-l-4 border-l-red-400">
                        <div className="flex justify-between items-start">
                          <div>
                            <p className="text-sm text-gray-500 font-medium">Inadimplência / Pendente</p>
                            <h3 className="text-2xl font-bold text-red-500 mt-1">{formatCurrency(dashboardStats.pending)}</h3>
                          </div>
                          <div className="p-3 bg-red-50 rounded-xl">
                            <Clock size={24} className="text-red-400" />
                          </div>
                        </div>
                      </div>
                    </div>

                    <div className="bg-white rounded-2xl shadow-sm border border-[#EAEAEA] overflow-hidden">
                      <div className="p-6 border-b border-[#EAEAEA] flex justify-between items-center">
                        <h3 className="text-lg font-serif text-[#333] flex items-center gap-2">
                          <FileText size={20} className="text-[#C5A059]"/> Contratos em Andamento
                        </h3>
                      </div>
                      
                      <div className="divide-y divide-[#EAEAEA]">
                        {filteredContracts.map(contract => {
                          const { paid, percentage } = getContractProgress(contract);
                          const isFullyPaid = percentage >= 100;

                          return (
                            <div key={contract.id} className="p-6 hover:bg-[#FAFAFA] transition-colors cursor-pointer group flex flex-col md:flex-row items-start md:items-center justify-between gap-4" onClick={() => { setSelectedContractId(contract.id); setView('contract_details'); }}>
                              <div className="flex-1">
                                <div className="flex items-center gap-3 mb-1">
                                  <h4 className="font-semibold text-lg text-[#333] group-hover:text-[#C5A059] transition-colors">{contract.clientName}</h4>
                                  {isFullyPaid && <span className="bg-green-100 text-green-700 text-[10px] uppercase font-bold px-2 py-0.5 rounded-full flex items-center gap-1"><CheckCircle2 size={10}/> Quitado</span>}
                                </div>
                                <p className="text-sm text-gray-500">{contract.description}</p>
                              </div>

                              <div className="w-full md:w-64">
                                <div className="flex justify-between text-xs mb-1 font-medium">
                                  <span className="text-[#C5A059]">{formatCurrency(paid)}</span>
                                  <span className="text-gray-400">de {formatCurrency(contract.totalAmount)}</span>
                                </div>
                                <div className="w-full bg-gray-100 rounded-full h-2 overflow-hidden">
                                  <div className={`h-2 rounded-full transition-all duration-1000 ${isFullyPaid ? 'bg-green-500' : 'bg-[#C5A059]'}`} style={{ width: `${percentage}%` }}></div>
                                </div>
                              </div>

                              <ChevronRight size={20} className="text-gray-300 group-hover:text-[#C5A059] hidden md:block" />
                            </div>
                          );
                        })}
                        {filteredContracts.length === 0 && (
                          <div className="p-8 text-center text-gray-400">Nenhum contrato encontrado.</div>
                        )}
                      </div>
                    </div>
                  </div>
                )}

                {view === 'contract_details' && selectedContract && (
                  <div className="animate-in fade-in slide-in-from-right-4 duration-500">
                    <button onClick={() => setView('dashboard')} className="flex items-center gap-2 text-gray-500 hover:text-[#C5A059] mb-6 transition-colors font-medium text-sm">
                      <ArrowLeft size={16} /> Voltar para o Painel
                    </button>

                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                      <div className="lg:col-span-2 space-y-6">
                        
                        <div className="bg-white p-8 rounded-2xl shadow-sm border border-[#EAEAEA] relative overflow-hidden">
                          <div className="absolute top-0 right-0 w-32 h-32 bg-gradient-to-bl from-[#C5A059]/10 to-transparent rounded-bl-full"></div>
                          
                          <div className="flex justify-between items-start mb-6">
                            <div>
                              <h2 className="text-3xl font-serif text-[#333] mb-2">{selectedContract.clientName}</h2>
                              <p className="text-gray-500 flex items-center gap-2">
                                <FileText size={16}/> {selectedContract.description}
                              </p>
                            </div>
                          </div>

                          <div className="grid grid-cols-2 gap-6 bg-[#FAFAFA] p-5 rounded-xl border border-[#EAEAEA]">
                            <div>
                              <p className="text-xs text-gray-500 uppercase tracking-wider mb-1 font-semibold">Valor Total Acordado</p>
                              <p className="text-xl font-bold text-[#333]">{formatCurrency(selectedContract.totalAmount)}</p>
                            </div>
                            <div>
                              <p className="text-xs text-gray-500 uppercase tracking-wider mb-1 font-semibold">Data de Início</p>
                              <p className="text-lg font-medium text-[#333] flex items-center gap-2">
                                <Calendar size={18} className="text-[#C5A059]"/>
                                {new Date(selectedContract.date + 'T00:00:00').toLocaleDateString('pt-BR')}
                              </p>
                            </div>
                          </div>
                        </div>

                        <div className="bg-white p-8 rounded-2xl shadow-sm border border-[#EAEAEA]">
                          <div className="flex justify-between items-center mb-6 border-b border-[#EAEAEA] pb-4">
                            <h3 className="text-xl font-serif text-[#333] flex items-center gap-2">
                              <File size={24} className="text-[#C5A059]"/> Documentos Anexados
                            </h3>
                            <Button onClick={() => setIsNewDocModalOpen(true)} className="py-2 px-4 shadow-md shadow-[#C5A059]/20">
                              <UploadCloud size={18} /> Anexar Documento
                            </Button>
                          </div>

                          {(selectedContract.documents && selectedContract.documents.length > 0) ? (
                            <div className="grid grid-cols-2 sm:grid-cols-3 gap-5">
                              {selectedContract.documents.map((doc) => {
                                const isLocked = doc.isConfidential && !unlockedDocs[doc.id];
                                return (
                                  <div key={doc.id} className="relative group rounded-xl border border-[#EAEAEA] overflow-hidden bg-white shadow-sm hover:shadow-md transition-all flex flex-col h-48">
                                    <div className={`h-32 bg-[#FAFAFA] flex items-center justify-center relative cursor-pointer overflow-hidden border-b border-[#EAEAEA] ${isLocked ? 'bg-gray-100' : ''}`} onClick={() => openDocViewer(doc)}>
                                      <div className={`w-16 h-20 bg-white shadow-sm border border-gray-200 p-2 flex flex-col gap-1.5 transition-all duration-300 ${isLocked ? 'blur-sm opacity-50 scale-95' : 'group-hover:scale-105'}`}>
                                         <div className="w-full h-1.5 bg-[#C5A059]/30 rounded-full"></div>
                                         <div className="w-3/4 h-1 bg-gray-200 rounded-full"></div>
                                         <div className="w-full h-1 bg-gray-200 mt-2 rounded-full"></div>
                                         <div className="w-5/6 h-1 bg-gray-200 rounded-full"></div>
                                         <div className="w-full h-1 bg-gray-200 rounded-full"></div>
                                      </div>

                                      {isLocked && (
                                        <div className="absolute inset-0 bg-white/40 backdrop-blur-[3px] flex items-center justify-center transition-all group-hover:bg-white/50">
                                           <div className="bg-white p-3 rounded-full text-red-500 shadow-lg border border-red-100">
                                             <Lock size={24} />
                                           </div>
                                        </div>
                                      )}

                                      {!isLocked && (
                                        <div className="absolute inset-0 bg-black/5 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                                           <div className="bg-white p-3 rounded-full text-[#C5A059] shadow-lg transform scale-90 group-hover:scale-100 transition-all">
                                             <Eye size={24} />
                                           </div>
                                        </div>
                                      )}
                                    </div>

                                    <div className="p-3 bg-white flex justify-between items-center gap-2 flex-1">
                                      <div className="overflow-hidden flex-1">
                                        <p className="text-xs font-semibold text-[#333] truncate" title={doc.name}>{doc.name}</p>
                                        {doc.isConfidential && !isLocked && (
                                          <p className="text-[10px] text-green-600 flex items-center gap-1 mt-1 font-medium">
                                            <Unlock size={10} /> Desbloqueado
                                          </p>
                                        )}
                                      </div>
                                      
                                      <div className="flex items-center gap-1">
                                        {doc.isConfidential && !isLocked && (
                                          <button onClick={(e) => { e.stopPropagation(); setUnlockedDocs({ ...unlockedDocs, [doc.id]: false }); }} className="p-1.5 rounded-md text-gray-400 hover:text-[#C5A059] hover:bg-[#C5A059]/10 transition-colors" title="Bloquear novamente">
                                            <Lock size={16} />
                                          </button>
                                        )}
                                        <button onClick={(e) => { e.stopPropagation(); setDocToDelete(doc); setIsDeleteModalOpen(true); }} className="p-1.5 rounded-md text-gray-400 hover:text-red-500 hover:bg-red-50 transition-colors" title="Excluir documento">
                                            <Trash2 size={16} />
                                        </button>
                                      </div>
                                    </div>
                                  </div>
                                );
                              })}
                            </div>
                          ) : (
                            <div className="text-center py-12 text-gray-400 flex flex-col items-center bg-[#FAFAFA] rounded-xl border border-dashed border-[#EAEAEA]">
                              <File size={48} className="mb-3 text-gray-300" />
                              <p className="font-medium text-[#333]">Nenhum documento anexado.</p>
                              <p className="text-sm mt-1">Guarde aqui procurações, contratos e peças do processo.</p>
                            </div>
                          )}
                        </div>
                      </div>

                      <div className="space-y-6">
                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-[#EAEAEA]">
                          <h3 className="text-lg font-serif text-[#333] mb-4 flex items-center gap-2 border-b border-[#EAEAEA] pb-4">
                            <PieChart size={20} className="text-[#C5A059]"/> Status Financeiro
                          </h3>
                          
                          {(() => {
                            const { paid, percentage } = getContractProgress(selectedContract);
                            const pending = selectedContract.totalAmount - paid;
                            const isFullyPaid = percentage >= 100;

                            return (
                              <div className="mb-6">
                                <div className="flex justify-between items-end mb-2">
                                  <div>
                                    <p className="text-xs text-gray-500 uppercase tracking-wider font-semibold">Progresso de Pagamento</p>
                                    <p className={`text-2xl font-bold mt-1 ${isFullyPaid ? 'text-green-600' : 'text-[#C5A059]'}`}>
                                      {percentage.toFixed(0)}%
                                    </p>
                                  </div>
                                </div>
                                <div className="w-full bg-gray-100 rounded-full h-3 mb-4 overflow-hidden border border-[#EAEAEA]">
                                  <div className={`h-3 rounded-full transition-all duration-1000 ${isFullyPaid ? 'bg-green-500' : 'bg-[#C5A059]'}`} style={{ width: `${percentage}%` }}></div>
                                </div>

                                <div className="space-y-3">
                                  <div className="flex justify-between items-center p-3 bg-[#FAFAFA] rounded-lg border border-[#EAEAEA]">
                                    <span className="text-sm text-gray-600 flex items-center gap-2"><CheckCircle2 size={16} className="text-green-500"/> Pago</span>
                                    <span className="font-bold text-[#333]">{formatCurrency(paid)}</span>
                                  </div>
                                  <div className="flex justify-between items-center p-3 bg-red-50 rounded-lg border border-red-100">
                                    <span className="text-sm text-red-600 flex items-center gap-2"><Clock size={16} className="text-red-400"/> Faltante</span>
                                    <span className="font-bold text-red-600">{formatCurrency(pending)}</span>
                                  </div>
                                </div>
                              </div>
                            );
                          })()}

                          <Button className="w-full shadow-md shadow-[#C5A059]/20" onClick={() => setIsNewPaymentModalOpen(true)}>
                            <DollarSign size={18} /> Registrar Pagamento
                          </Button>
                        </div>

                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-[#EAEAEA]">
                          <h3 className="text-lg font-serif text-[#333] mb-4 pb-4 border-b border-[#EAEAEA]">Histórico de Entradas</h3>
                          
                          <div className="space-y-3">
                            {selectedContract.payments.length > 0 ? (
                              selectedContract.payments.map((payment, index) => (
                                <div key={payment.id} className="flex justify-between items-center p-3 hover:bg-[#FAFAFA] rounded-lg transition-colors border border-transparent hover:border-[#EAEAEA]">
                                  <div className="flex items-center gap-3">
                                    <div className="w-8 h-8 rounded-full bg-[#C5A059]/10 flex items-center justify-center text-[#C5A059] font-bold text-xs">
                                      {index + 1}
                                    </div>
                                    <div>
                                      <p className="font-semibold text-[#333]">{formatCurrency(payment.amount)}</p>
                                      <p className="text-xs text-gray-500 flex items-center gap-1 mt-0.5">
                                        <Calendar size={10} />
                                        {new Date(payment.date + 'T00:00:00').toLocaleDateString('pt-BR')}
                                      </p>
                                    </div>
                                  </div>
                                  <span className="bg-green-100 text-green-700 p-1.5 rounded-full"><CheckCircle2 size={14}/></span>
                                </div>
                              ))
                            ) : (
                              <p className="text-sm text-center text-gray-400 py-4">Nenhum pagamento registrado ainda.</p>
                            )}
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                )}
              </main>

              <Modal isOpen={isNewContractModalOpen} onClose={() => setIsNewContractModalOpen(false)} title="Novo Contrato">
                <form onSubmit={handleAddContract} className="space-y-4">
                  <div>
                    <label className="block text-sm font-medium text-gray-700 mb-1">Nome do Cliente</label>
                    <input required type="text" className="w-full p-2.5 rounded-lg border border-[#EAEAEA] focus:border-[#C5A059] outline-none" value={newContractForm.clientName} onChange={e => setNewContractForm({...newContractForm, clientName: e.target.value})} />
                  </div>
                  <div>
                    <label className="block text-sm font-medium text-gray-700 mb-1">Descrição / Assunto</label>
                    <input required type="text" className="w-full p-2.5 rounded-lg border border-[#EAEAEA] focus:border-[#C5A059] outline-none" placeholder="Ex: Inventário, Divórcio..." value={newContractForm.description} onChange={e => setNewContractForm({...newContractForm, description: e.target.value})} />
                  </div>
                  <div className="grid grid-cols-2 gap-4">
                    <div>
                      <label className="block text-sm font-medium text-gray-700 mb-1">Valor Total (R$)</label>
                      <input required type="number" min="0" step="0.01" className="w-full p-2.5 rounded-lg border border-[#EAEAEA] focus:border-[#C5A059] outline-none" value={newContractForm.totalAmount} onChange={e => setNewContractForm({...newContractForm, totalAmount: e.target.value})} />
                    </div>
                    <div>
                      <label className="block text-sm font-medium text-gray-700 mb-1">Data</label>
                      <input required type="date" className="w-full p-2.5 rounded-lg border border-[#EAEAEA] focus:border-[#C5A059] outline-none" value={newContractForm.date} onChange={e => setNewContractForm({...newContractForm, date: e.target.value})} />
                    </div>
                  </div>
                  <div className="pt-4 flex justify-end gap-3">
                    <Button variant="ghost" type="button" onClick={() => setIsNewContractModalOpen(false)}>Cancelar</Button>
                    <Button type="submit">Criar Contrato</Button>
                  </div>
                </form>
              </Modal>

              <Modal isOpen={isNewPaymentModalOpen} onClose={() => setIsNewPaymentModalOpen(false)} title="Registrar Pagamento">
                <form onSubmit={handleAddPayment} className="space-y-4">
                  <div>
                    <label className="block text-sm font-medium text-gray-700 mb-1">Valor Recebido (R$)</label>
                    <input required type="number" min="0" step="0.01" className="w-full p-2.5 text-lg font-bold rounded-lg border border-[#EAEAEA] focus:border-[#C5A059] outline-none text-[#C5A059]" value={newPaymentForm.amount} onChange={e => setNewPaymentForm({...newPaymentForm, amount: e.target.value})} />
                  </div>
                  <div>
                    <label className="block text-sm font-medium text-gray-700 mb-1">Data do Pagamento</label>
                    <input required type="date" className="w-full p-2.5 rounded-lg border border-[#EAEAEA] focus:border-[#C5A059] outline-none" value={newPaymentForm.date} onChange={e => setNewPaymentForm({...newPaymentForm, date: e.target.value})} />
                  </div>
                  <div className="pt-4 flex justify-end gap-3">
                    <Button variant="ghost" type="button" onClick={() => setIsNewPaymentModalOpen(false)}>Cancelar</Button>
                    <Button type="submit">Confirmar Recebimento</Button>
                  </div>
                </form>
              </Modal>

              <Modal isOpen={isNewDocModalOpen} onClose={() => { setIsNewDocModalOpen(false); setNewDocForm({ name: '', isConfidential: false, file: null }); }} title="Anexar Documento">
                <form onSubmit={handleAddDocument} className="space-y-4">
                  <div>
                    <label className="block text-sm font-medium text-gray-700 mb-2">Arquivo (PDF)</label>
                    <div className={`border-2 border-dashed rounded-xl p-6 flex flex-col items-center justify-center text-center transition-colors relative ${newDocForm.name ? 'border-[#C5A059] bg-[#C5A059]/5' : 'border-[#EAEAEA] hover:border-[#C5A059] bg-[#FAFAFA]'}`}>
                      <input required type="file" accept=".pdf,application/pdf" className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" onChange={e => { if (e.target.files && e.target.files[0]) { setNewDocForm({...newDocForm, name: e.target.files[0].name, file: e.target.files[0]}); } }} />
                      <UploadCloud className={`mb-3 ${newDocForm.name ? 'text-[#C5A059]' : 'text-gray-400'}`} size={32} />
                      {newDocForm.name ? (
                        <>
                          <p className="text-sm font-medium text-[#C5A059] truncate max-w-full px-4">{newDocForm.name}</p>
                          <p className="text-xs text-gray-500 mt-1">Clique para alterar o arquivo</p>
                        </>
                      ) : (
                        <>
                          <p className="text-sm font-medium text-[#333]">Clique ou arraste para anexar</p>
                          <p className="text-xs text-gray-500 mt-1">Apenas arquivos .pdf permitidos</p>
                        </>
                      )}
                    </div>
                  </div>
                  <div className="flex items-center gap-3 p-4 bg-[#FAFAFA] border border-[#EAEAEA] rounded-lg mt-2 cursor-pointer hover:bg-gray-100 transition-colors" onClick={() => setNewDocForm({...newDocForm, isConfidential: !newDocForm.isConfidential})}>
                    <div className={`w-5 h-5 rounded flex items-center justify-center border transition-colors ${newDocForm.isConfidential ? 'bg-[#C5A059] border-[#C5A059]' : 'bg-white border-gray-300'}`}>
                      {newDocForm.isConfidential && <Lock size={12} className="text-white" />}
                    </div>
                    <div>
                      <p className="text-sm font-medium text-[#333]">Marcar como Sigiloso</p>
                      <p className="text-xs text-gray-500">Exigirá senha mestre para visualização.</p>
                    </div>
                  </div>
                  <div className="pt-4 flex justify-end gap-3">
                    <Button variant="ghost" type="button" onClick={() => setIsNewDocModalOpen(false)}>Cancelar</Button>
                    <Button type="submit">Salvar Anexo</Button>
                  </div>
                </form>
              </Modal>

              <Modal isOpen={isPasswordModalOpen} onClose={() => { setIsPasswordModalOpen(false); setPasswordError(false); setDocPasswordAttempt(''); }} title="Documento Protegido">
                <form onSubmit={handleUnlockDoc} className="space-y-4">
                  <div className="flex flex-col items-center justify-center mb-4 text-center">
                    <div className="w-16 h-16 bg-red-50 text-red-500 rounded-full flex items-center justify-center mb-4">
                      <ShieldAlert size={32} />
                    </div>
                    <p className="text-sm text-gray-600">Este documento é sigiloso. Insira a senha mestre da advocacia para visualizar o conteúdo.</p>
                  </div>
                  <div>
                    <input required autoFocus type="password" placeholder="Senha Mestre" className={`w-full p-3 rounded-lg border text-center text-lg tracking-widest outline-none transition-colors ${passwordError ? 'border-red-400 bg-red-50 focus:border-red-500' : 'border-[#EAEAEA] focus:border-[#C5A059]'}`} value={docPasswordAttempt} onChange={e => { setDocPasswordAttempt(e.target.value); setPasswordError(false); }} />
                    {passwordError && <p className="text-red-500 text-xs text-center mt-2 font-medium">Senha incorreta. Tente novamente.</p>}
                  </div>
                  <div className="pt-2">
                    <Button type="submit" className="w-full">Desbloquear Arquivo</Button>
                  </div>
                </form>
              </Modal>

              <Modal isOpen={!!viewingDoc} onClose={() => setViewingDoc(null)} title={viewingDoc ? viewingDoc.name : ''}>
                <div className="w-full h-[65vh] bg-[#525659] rounded-xl overflow-hidden flex items-center justify-center shadow-inner relative">
                  {viewingDoc && viewingDoc.file && pdfUrl ? (
                    <iframe src={pdfUrl} className="w-full h-full bg-white" title="PDF Viewer" />
                  ) : (
                    <div className="flex flex-col items-center justify-center h-full w-full bg-[#FAFAFA]">
                      <div className="bg-white p-8 shadow-sm border border-[#EAEAEA] rounded-xl max-w-[80%] text-center">
                        <FileText size={56} className="mx-auto mb-4 text-[#C5A059]/50" />
                        <h4 className="font-semibold text-[#333] mb-2">{viewingDoc?.name}</h4>
                        <p className="text-sm text-gray-500">Este é um documento de demonstração do sistema.</p>
                        <p className="text-xs text-gray-400 mt-3 p-3 bg-gray-50 rounded-lg border border-gray-100">
                          Quando você anexar um arquivo PDF real do seu computador clicando no botão "Anexar Documento", o conteúdo dele será exibido aqui para leitura.
                        </p>
                      </div>
                    </div>
                  )}
                </div>
              </Modal>

              <Modal isOpen={isDeleteModalOpen} onClose={() => { setIsDeleteModalOpen(false); setDeletePasswordError(false); setDeletePasswordAttempt(''); }} title="Confirmar Exclusão">
                <form onSubmit={handleDeleteDoc} className="space-y-4">
                  <div className="flex flex-col items-center justify-center mb-4 text-center">
                    <div className="w-16 h-16 bg-red-50 text-red-500 rounded-full flex items-center justify-center mb-3">
                      <Trash2 size={32} />
                    </div>
                    <p className="text-sm text-gray-600">Tem certeza que deseja excluir o documento <strong>{docToDelete?.name}</strong>?</p>
                    <p className="text-sm font-bold text-red-500 mt-2 bg-red-50 p-2 rounded-lg border border-red-100">Esta ação exige a senha mestre de proteção.</p>
                  </div>
                  <div>
                    <input required autoFocus type="password" placeholder="Senha Mestre" className={`w-full p-3 rounded-lg border text-center text-lg tracking-widest outline-none transition-colors ${deletePasswordError ? 'border-red-400 bg-red-50 focus:border-red-500' : 'border-[#EAEAEA] focus:border-[#C5A059]'}`} value={deletePasswordAttempt} onChange={e => { setDeletePasswordAttempt(e.target.value); setDeletePasswordError(false); }} />
                    {deletePasswordError && <p className="text-red-500 text-xs text-center mt-2 font-medium">Senha incorreta. Tente novamente.</p>}
                  </div>
                  <div className="pt-2 flex gap-3">
                    <Button variant="ghost" type="button" className="flex-1" onClick={() => setIsDeleteModalOpen(false)}>Cancelar</Button>
                    <button type="submit" className="flex-1 bg-red-500 hover:bg-red-600 text-white rounded-lg font-medium transition-colors shadow-md shadow-red-500/20">
                      Excluir Arquivo
                    </button>
                  </div>
                </form>
              </Modal>
            </div>
          );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
